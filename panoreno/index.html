<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Panoreno | Panoramic Renovations</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css">
  <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #050505;
      overflow: hidden;
    }

    [hidden] {
      display: none !important;
    }

    #panorama {
      width: 100vw;
      height: 100vh;
    }

    #draw-layer {
      position: fixed;
      inset: 0;
      z-index: 4;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      touch-action: none;
    }

    body.is-drawing #draw-layer {
      cursor: crosshair;
      pointer-events: auto;
    }

    .viewer-header {
      position: fixed;
      top: 16px;
      left: 16px;
      right: 16px;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      pointer-events: none;
    }

    .brand {
      max-width: min(420px, 52vw);
      color: white;
      text-shadow: 0 2px 14px rgb(0 0 0 / 72%);
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(1.25rem, 2.8vw, 2.35rem);
      line-height: 1;
      letter-spacing: 0;
    }

    .brand p {
      margin: 6px 0 0;
      color: rgb(255 255 255 / 76%);
      font-size: clamp(0.78rem, 1.4vw, 0.95rem);
      line-height: 1.35;
    }

    .image-switcher {
      display: flex;
      gap: 4px;
      padding: 4px;
      border: 1px solid rgb(255 255 255 / 20%);
      border-radius: 8px;
      background: rgb(0 0 0 / 58%);
      backdrop-filter: blur(14px);
      pointer-events: auto;
    }

    .image-switcher button {
      min-width: 96px;
      height: 34px;
      border: 0;
      border-radius: 5px;
      color: rgb(255 255 255 / 78%);
      background: transparent;
      font: inherit;
      font-size: 0.88rem;
      cursor: pointer;
    }

    .image-switcher button[aria-pressed="true"] {
      color: #111;
      background: #f4f1e8;
    }

    .pnlm-controls-container {
      bottom: 18px;
    }

    .annotation-panel {
      position: fixed;
      left: 16px;
      bottom: 18px;
      z-index: 6;
      width: min(390px, calc(100vw - 32px));
      padding: 12px;
      border: 1px solid rgb(255 255 255 / 18%);
      border-radius: 8px;
      color: white;
      background: rgb(0 0 0 / 68%);
      box-shadow: 0 18px 50px rgb(0 0 0 / 38%);
      backdrop-filter: blur(14px);
    }

    .annotation-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }

    .annotation-actions button,
    .export-link {
      min-height: 34px;
      border: 1px solid rgb(255 255 255 / 20%);
      border-radius: 6px;
      padding: 0 12px;
      color: white;
      background: rgb(255 255 255 / 10%);
      font: inherit;
      font-size: 0.84rem;
      text-decoration: none;
      cursor: pointer;
    }

    .annotation-actions button:disabled,
    .export-link[aria-disabled="true"] {
      opacity: 0.42;
      cursor: not-allowed;
    }

    .annotation-actions button[data-active="true"] {
      color: #111;
      background: #f4f1e8;
    }

    .annotation-panel textarea {
      box-sizing: border-box;
      width: 100%;
      min-height: 76px;
      resize: vertical;
      border: 1px solid rgb(255 255 255 / 18%);
      border-radius: 6px;
      padding: 9px 10px;
      color: white;
      background: rgb(255 255 255 / 9%);
      font: inherit;
      font-size: 0.86rem;
    }

    .annotation-readout {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 10px;
      color: rgb(255 255 255 / 70%);
      font-size: 0.74rem;
    }

    .annotation-readout strong {
      display: block;
      margin-top: 2px;
      color: #f4f1e8;
      font-size: 0.85rem;
    }

    .coordinate-output {
      box-sizing: border-box;
      width: 100%;
      max-height: 92px;
      margin-top: 10px;
      overflow: auto;
      border: 1px solid rgb(255 255 255 / 12%);
      border-radius: 6px;
      padding: 8px;
      color: rgb(255 255 255 / 72%);
      background: rgb(0 0 0 / 32%);
      font: 0.72rem ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      white-space: pre-wrap;
    }

    .review-panel {
      position: fixed;
      right: 16px;
      bottom: 18px;
      z-index: 6;
      width: min(46vw, 720px);
      max-height: calc(100vh - 36px);
      overflow: auto;
      padding: 12px;
      border: 1px solid rgb(255 255 255 / 18%);
      border-radius: 8px;
      color: white;
      background: rgb(0 0 0 / 70%);
      box-shadow: 0 18px 50px rgb(0 0 0 / 38%);
      backdrop-filter: blur(14px);
    }

    .review-panel h2 {
      margin: 0 0 10px;
      font-size: 0.92rem;
      letter-spacing: 0;
    }

    .review-frame {
      position: relative;
      overflow: hidden;
      width: 100%;
      border: 1px solid rgb(255 255 255 / 14%);
      border-radius: 6px;
      background:
        linear-gradient(45deg, rgb(255 255 255 / 12%) 25%, transparent 25%),
        linear-gradient(-45deg, rgb(255 255 255 / 12%) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgb(255 255 255 / 12%) 75%),
        linear-gradient(-45deg, transparent 75%, rgb(255 255 255 / 12%) 75%);
      background-position: 0 0, 0 8px, 8px -8px, -8px 0;
      background-size: 16px 16px;
    }

    .review-full,
    .review-crop {
      display: block;
      user-select: none;
    }

    .review-full {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .review-crop {
      position: absolute;
      outline: 1px solid rgb(255 235 59 / 78%);
      pointer-events: none;
    }

    .opacity-controls {
      display: grid;
      grid-template-columns: 82px 1fr 42px;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      color: rgb(255 255 255 / 72%);
      font-size: 0.78rem;
    }

    .opacity-controls input {
      width: 100%;
      accent-color: #f4f1e8;
    }

    .crop-output {
      box-sizing: border-box;
      width: 100%;
      max-height: 110px;
      margin: 10px 0 0;
      overflow: auto;
      border: 1px solid rgb(255 255 255 / 12%);
      border-radius: 6px;
      padding: 8px;
      color: rgb(255 255 255 / 72%);
      background: rgb(0 0 0 / 32%);
      font: 0.72rem ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      white-space: pre-wrap;
    }

    @media (max-width: 680px) {
      .viewer-header {
        align-items: flex-start;
        flex-direction: column;
      }

      .brand {
        max-width: 100%;
      }

      .image-switcher {
        width: calc(100vw - 40px);
      }

      .image-switcher button {
        flex: 1;
        min-width: 0;
      }

      .annotation-panel {
        left: 12px;
        right: 12px;
        bottom: 12px;
        width: auto;
      }

      .review-panel {
        left: 12px;
        right: 12px;
        width: auto;
      }
    }
  </style>
</head>
<body>
  <main id="panorama" aria-label="Panoramic renovation viewer"></main>
  <canvas id="draw-layer" aria-label="Outline drawing layer"></canvas>

  <header class="viewer-header">
    <div class="brand">
      <h1>Panoreno</h1>
      <p>Panoramic renovations before and after.</p>
    </div>

    <nav class="image-switcher" aria-label="Panorama image">
      <button type="button" data-panorama="original" aria-pressed="false">Original</button>
      <button type="button" data-panorama="remodeled" aria-pressed="true">Remodeled</button>
    </nav>
  </header>

  <aside class="annotation-panel" aria-label="Panorama annotation tools">
    <div class="annotation-actions">
      <button type="button" id="draw-toggle">Draw Outline</button>
      <button type="button" id="close-outline" disabled>Close</button>
      <button type="button" id="clear-outline" disabled>Clear</button>
      <button type="button" id="export-crop" disabled>Export PNG</button>
      <a class="export-link" id="download-crop" aria-disabled="true">Download PNG</a>
    </div>

    <textarea id="region-prompt" placeholder="Describe the change for this outlined area"></textarea>

    <div class="annotation-readout">
      <div>
        Points
        <strong id="point-count">0</strong>
      </div>
      <div>
        View yaw
        <strong id="view-yaw">0.0</strong>
      </div>
      <div>
        View pitch
        <strong id="view-pitch">0.0</strong>
      </div>
    </div>

    <pre class="coordinate-output" id="coordinate-output">[]</pre>
  </aside>

  <aside class="review-panel" id="review-panel" aria-label="Panorama crop verification" hidden>
    <h2>Crop Check</h2>
    <div class="review-frame" id="review-frame">
      <img class="review-full" id="review-full" alt="Full source panorama">
      <img class="review-crop" id="review-crop" alt="Transparent extracted crop">
    </div>

    <label class="opacity-controls" for="full-opacity">
      Full
      <input id="full-opacity" type="range" min="0" max="1" value="0.45" step="0.01">
      <output id="full-opacity-value" for="full-opacity">45%</output>
    </label>

    <label class="opacity-controls" for="crop-opacity">
      Crop
      <input id="crop-opacity" type="range" min="0" max="1" value="1" step="0.01">
      <output id="crop-opacity-value" for="crop-opacity">100%</output>
    </label>

    <pre class="crop-output" id="crop-output"></pre>
  </aside>

  <script>
    const panoramas = {
      original: {
        label: "Original",
        src: "assets/original.jpeg",
        haov: 290,
        vaov: 95,
        vOffset: -5.5
      },
      remodeled: {
        label: "Remodeled",
        src: "assets/remodeled.png",
        haov: 290,
        vaov: 95,
        vOffset: -5.5
      }
    };

    let viewer;
    let currentPanorama = "remodeled";
    let isDrawing = false;
    let isClosed = false;
    let points = [];
    let cropObjectUrl;

    const drawCanvas = document.querySelector("#draw-layer");
    const drawContext = drawCanvas.getContext("2d");
    const drawToggle = document.querySelector("#draw-toggle");
    const closeOutline = document.querySelector("#close-outline");
    const clearOutline = document.querySelector("#clear-outline");
    const exportCrop = document.querySelector("#export-crop");
    const downloadCrop = document.querySelector("#download-crop");
    const pointCount = document.querySelector("#point-count");
    const viewYaw = document.querySelector("#view-yaw");
    const viewPitch = document.querySelector("#view-pitch");
    const coordinateOutput = document.querySelector("#coordinate-output");
    const reviewPanel = document.querySelector("#review-panel");
    const reviewFrame = document.querySelector("#review-frame");
    const reviewFull = document.querySelector("#review-full");
    const reviewCrop = document.querySelector("#review-crop");
    const fullOpacity = document.querySelector("#full-opacity");
    const cropOpacity = document.querySelector("#crop-opacity");
    const fullOpacityValue = document.querySelector("#full-opacity-value");
    const cropOpacityValue = document.querySelector("#crop-opacity-value");
    const cropOutput = document.querySelector("#crop-output");
    const imageCache = {};

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function getSignedAngleDelta(value) {
      return ((((value + 180) % 360) + 360) % 360) - 180;
    }

    function loadSourceImage(scene) {
      if (imageCache[scene.src]) {
        return Promise.resolve(imageCache[scene.src]);
      }

      return new Promise((resolve, reject) => {
        const image = new Image();

        image.addEventListener("load", () => {
          imageCache[scene.src] = image;
          resolve(image);
        });

        image.addEventListener("error", () => {
          reject(new Error(`Could not load ${scene.src}`));
        });

        image.src = scene.src;
      });
    }

    function yawPitchToImagePoint(point, scene, image) {
      const centerYaw = scene.hOffset || 0;
      const yawDelta = getSignedAngleDelta(point.yaw - centerYaw);
      const topPitch = scene.vOffset + (scene.vaov / 2);

      return {
        x: clamp(((yawDelta + (scene.haov / 2)) / scene.haov) * image.naturalWidth, 0, image.naturalWidth),
        y: clamp(((topPitch - point.pitch) / scene.vaov) * image.naturalHeight, 0, image.naturalHeight),
        pitch: point.pitch,
        yaw: point.yaw
      };
    }

    function getSourceBoundingBox(sourcePoints, image) {
      const xs = sourcePoints.map((point) => point.x);
      const ys = sourcePoints.map((point) => point.y);
      const padding = 8;

      return {
        left: clamp(Math.floor(Math.min(...xs) - padding), 0, image.naturalWidth),
        top: clamp(Math.floor(Math.min(...ys) - padding), 0, image.naturalHeight),
        right: clamp(Math.ceil(Math.max(...xs) + padding), 0, image.naturalWidth),
        bottom: clamp(Math.ceil(Math.max(...ys) + padding), 0, image.naturalHeight)
      };
    }

    function canvasToPngUrl(canvas) {
      return new Promise((resolve, reject) => {
        canvas.toBlob((blob) => {
          if (!blob) {
            reject(new Error("Could not create PNG export"));
            return;
          }

          resolve(URL.createObjectURL(blob));
        }, "image/png");
      });
    }

    function resetReview() {
      reviewPanel.hidden = true;
      reviewCrop.removeAttribute("src");
      reviewFull.removeAttribute("src");
      cropOutput.textContent = "";

      if (cropObjectUrl) {
        URL.revokeObjectURL(cropObjectUrl);
        cropObjectUrl = undefined;
      }
    }

    function setOpacityDisplays() {
      reviewFull.style.opacity = fullOpacity.value;
      reviewCrop.style.opacity = cropOpacity.value;
      fullOpacityValue.value = `${Math.round(Number(fullOpacity.value) * 100)}%`;
      cropOpacityValue.value = `${Math.round(Number(cropOpacity.value) * 100)}%`;
    }

    function resizeDrawCanvas() {
      const scale = window.devicePixelRatio || 1;
      drawCanvas.width = Math.round(window.innerWidth * scale);
      drawCanvas.height = Math.round(window.innerHeight * scale);
      drawContext.setTransform(scale, 0, 0, scale, 0, 0);
      renderOutline();
    }

    function updateAnnotationUi() {
      pointCount.textContent = points.length;
      closeOutline.disabled = points.length < 3 || isClosed;
      clearOutline.disabled = points.length === 0;
      exportCrop.disabled = !isClosed;
      drawToggle.dataset.active = String(isDrawing);
      drawToggle.textContent = isDrawing ? "Stop Drawing" : "Draw Outline";

      if (viewer) {
        viewYaw.textContent = viewer.getYaw().toFixed(1);
        viewPitch.textContent = viewer.getPitch().toFixed(1);
      }

      coordinateOutput.textContent = JSON.stringify(points.map((point) => ({
        x: Math.round(point.x),
        y: Math.round(point.y),
        pitch: Number(point.pitch.toFixed(3)),
        yaw: Number(point.yaw.toFixed(3))
      })), null, 2);
    }

    function renderOutline() {
      drawContext.clearRect(0, 0, window.innerWidth, window.innerHeight);

      if (points.length === 0) {
        updateAnnotationUi();
        return;
      }

      drawContext.lineWidth = 3;
      drawContext.strokeStyle = "#f4f1e8";
      drawContext.fillStyle = "rgb(244 241 232 / 18%)";
      drawContext.beginPath();
      drawContext.moveTo(points[0].x, points[0].y);

      points.slice(1).forEach((point) => {
        drawContext.lineTo(point.x, point.y);
      });

      if (isClosed) {
        drawContext.closePath();
        drawContext.fill();
      }

      drawContext.stroke();

      points.forEach((point) => {
        drawContext.beginPath();
        drawContext.arc(point.x, point.y, 5, 0, Math.PI * 2);
        drawContext.fillStyle = "#f4f1e8";
        drawContext.fill();
        drawContext.strokeStyle = "#111";
        drawContext.lineWidth = 1.5;
        drawContext.stroke();
      });

      updateAnnotationUi();
    }

    function clearAnnotation() {
      points = [];
      isClosed = false;
      resetReview();
      downloadCrop.removeAttribute("href");
      downloadCrop.removeAttribute("download");
      downloadCrop.setAttribute("aria-disabled", "true");
      renderOutline();
    }

    function setDrawing(nextValue) {
      isDrawing = nextValue;
      document.body.classList.toggle("is-drawing", isDrawing);

      if (viewer) {
        if (typeof viewer.setMouseZoom === "function") {
          viewer.setMouseZoom(!isDrawing);
        }

        if (typeof viewer.setKeyboardZoom === "function") {
          viewer.setKeyboardZoom(!isDrawing);
        }

        if (typeof viewer.setDraggable === "function") {
          viewer.setDraggable(!isDrawing);
        }
      }

      updateAnnotationUi();
    }

    function getCanvasPoint(event) {
      const rect = drawCanvas.getBoundingClientRect();
      const x = event.clientX - rect.left;
      const y = event.clientY - rect.top;
      const coords = viewer && typeof viewer.mouseEventToCoords === "function"
        ? viewer.mouseEventToCoords(event)
        : [viewer ? viewer.getPitch() : 0, viewer ? viewer.getYaw() : 0];

      return {
        x,
        y,
        pitch: coords[0],
        yaw: coords[1]
      };
    }

    async function exportOutlinedCrop() {
      const scene = panoramas[currentPanorama];

      if (!isClosed) {
        return;
      }

      exportCrop.disabled = true;
      exportCrop.textContent = "Exporting...";

      try {
        const image = await loadSourceImage(scene);
        const sourcePoints = points.map((point) => yawPitchToImagePoint(point, scene, image));
        const box = getSourceBoundingBox(sourcePoints, image);
        const width = Math.max(1, box.right - box.left);
        const height = Math.max(1, box.bottom - box.top);
        const output = document.createElement("canvas");
        const outputContext = output.getContext("2d");

        output.width = width;
        output.height = height;

        outputContext.save();
        outputContext.beginPath();
        outputContext.moveTo(sourcePoints[0].x - box.left, sourcePoints[0].y - box.top);
        sourcePoints.slice(1).forEach((point) => {
          outputContext.lineTo(point.x - box.left, point.y - box.top);
        });
        outputContext.closePath();
        outputContext.clip();
        outputContext.drawImage(
          image,
          box.left,
          box.top,
          width,
          height,
          0,
          0,
          width,
          height
        );
        outputContext.restore();

        if (cropObjectUrl) {
          URL.revokeObjectURL(cropObjectUrl);
        }

        cropObjectUrl = await canvasToPngUrl(output);
        downloadCrop.href = cropObjectUrl;
        downloadCrop.download = `panoreno-${currentPanorama}-transparent-crop-${Date.now()}.png`;
        downloadCrop.removeAttribute("aria-disabled");

        reviewPanel.hidden = false;
        reviewFrame.style.aspectRatio = `${image.naturalWidth} / ${image.naturalHeight}`;
        reviewFull.src = scene.src;
        reviewCrop.src = cropObjectUrl;
        reviewCrop.style.left = `${(box.left / image.naturalWidth) * 100}%`;
        reviewCrop.style.top = `${(box.top / image.naturalHeight) * 100}%`;
        reviewCrop.style.width = `${(width / image.naturalWidth) * 100}%`;
        reviewCrop.style.height = `${(height / image.naturalHeight) * 100}%`;
        setOpacityDisplays();

        cropOutput.textContent = JSON.stringify({
          source: scene.src,
          image: {
            width: image.naturalWidth,
            height: image.naturalHeight
          },
          crop: {
            x: box.left,
            y: box.top,
            width,
            height
          },
          polygon: sourcePoints.map((point) => ({
            x: Math.round(point.x),
            y: Math.round(point.y),
            yaw: Number(point.yaw.toFixed(3)),
            pitch: Number(point.pitch.toFixed(3))
          }))
        }, null, 2);

        downloadCrop.click();
      } catch (error) {
        cropOutput.textContent = error.message;
        reviewPanel.hidden = false;
      } finally {
        exportCrop.textContent = "Export PNG";
        updateAnnotationUi();
      }
    }

    function loadPanorama(key) {
      const scene = panoramas[key];
      currentPanorama = key;

      if (viewer) {
        viewer.destroy();
      }

      viewer = pannellum.viewer("panorama", {
        type: "equirectangular",
        panorama: scene.src,
        autoLoad: true,
        showControls: true,
        backgroundColor: [0, 0, 0],
        haov: scene.haov,
        vaov: scene.vaov,
        vOffset: scene.vOffset,
        pitch: 0,
        yaw: 0,
        hfov: 100
      });

      document.querySelectorAll("[data-panorama]").forEach((button) => {
        button.setAttribute("aria-pressed", String(button.dataset.panorama === key));
      });

      clearAnnotation();
      setDrawing(false);
    }

    document.querySelectorAll("[data-panorama]").forEach((button) => {
      button.addEventListener("click", () => loadPanorama(button.dataset.panorama));
    });

    drawCanvas.addEventListener("pointerdown", (event) => {
      if (!isDrawing || isClosed) {
        return;
      }

      event.preventDefault();
      points.push(getCanvasPoint(event));
      renderOutline();
    });

    drawToggle.addEventListener("click", () => setDrawing(!isDrawing));
    closeOutline.addEventListener("click", () => {
      isClosed = points.length >= 3;
      setDrawing(false);
      renderOutline();
    });
    clearOutline.addEventListener("click", clearAnnotation);
    exportCrop.addEventListener("click", exportOutlinedCrop);
    fullOpacity.addEventListener("input", setOpacityDisplays);
    cropOpacity.addEventListener("input", setOpacityDisplays);
    downloadCrop.addEventListener("click", (event) => {
      if (!downloadCrop.href) {
        event.preventDefault();
      }
    });
    window.addEventListener("resize", resizeDrawCanvas);
    window.setInterval(updateAnnotationUi, 300);

    setOpacityDisplays();
    resizeDrawCanvas();
    loadPanorama("remodeled");
  </script>
</body>
</html>
