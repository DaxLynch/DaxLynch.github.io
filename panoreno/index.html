<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Panoreno | Panoramic Renovations</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css">
  <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="config.js"></script>

  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #050505;
      overflow: hidden;
    }

    [hidden] {
      display: none !important;
    }

    #panorama {
      width: 100vw;
      height: 100vh;
    }

    #draw-layer {
      position: fixed;
      inset: 0;
      z-index: 4;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      touch-action: none;
    }

    body.is-drawing #draw-layer {
      cursor: crosshair;
      pointer-events: auto;
    }

    .viewer-header {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 5;
      display: flex;
      align-items: center;
      gap: 12px;
      pointer-events: none;
    }

    .viewer-controls {
      box-sizing: border-box;
      display: grid;
      gap: 6px;
      padding: 6px;
      border: 1px solid rgb(255 255 255 / 20%);
      border-radius: 8px;
      background: rgb(0 0 0 / 58%);
      backdrop-filter: blur(14px);
      pointer-events: auto;
    }

    .viewer-controls-topbar,
    .generation-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .viewer-controls-topbar strong,
    .generation-topbar strong {
      min-width: 0;
      overflow: hidden;
      color: rgb(255 255 255 / 82%);
      font-size: 0.84rem;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .viewer-controls-body {
      display: grid;
      gap: 6px;
    }

    .viewer-controls.is-collapsed .viewer-controls-body,
    .generation-panel.is-collapsed .generation-body {
      display: none;
    }

    .room-switcher,
    .image-switcher {
      display: flex;
      gap: 4px;
      padding: 0;
      pointer-events: auto;
    }

    .room-switcher button,
    .image-switcher button {
      min-width: 96px;
      height: 34px;
      border: 0;
      border-radius: 5px;
      color: rgb(255 255 255 / 78%);
      background: transparent;
      font: inherit;
      font-size: 0.88rem;
      cursor: pointer;
    }

    .room-switcher button[aria-pressed="true"],
    .image-switcher button[aria-pressed="true"] {
      color: #111;
      background: #f4f1e8;
    }

    .generation-panel {
      position: fixed;
      box-sizing: border-box;
      top: 16px;
      right: 16px;
      z-index: 6;
      width: min(390px, calc(100vw - 32px));
      padding: 12px;
      border: 1px solid rgb(255 255 255 / 18%);
      border-radius: 8px;
      color: white;
      background: rgb(0 0 0 / 68%);
      box-shadow: 0 18px 50px rgb(0 0 0 / 38%);
      backdrop-filter: blur(14px);
      pointer-events: auto;
    }

    .generation-body {
      margin-top: 10px;
    }

    .generation-controls {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .generation-controls input {
      box-sizing: border-box;
      width: 100%;
      min-height: 34px;
      border: 1px solid rgb(255 255 255 / 18%);
      border-radius: 6px;
      padding: 7px 9px;
      color: white;
      background: rgb(255 255 255 / 9%);
      font: inherit;
      font-size: 0.84rem;
    }

    .generation-controls input::file-selector-button,
    .generation-controls button,
    .fork-tree button,
    .fork-tree a,
    .panel-toggle {
      min-height: 34px;
      border: 1px solid rgb(255 255 255 / 20%);
      border-radius: 6px;
      padding: 0 10px;
      color: white;
      background: rgb(255 255 255 / 10%);
      font: inherit;
      font-size: 0.84rem;
      cursor: pointer;
    }

    .fork-tree a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
      min-width: 86px;
      text-decoration: none;
    }

    .generation-controls button:disabled {
      opacity: 0.42;
      cursor: not-allowed;
    }

    .fork-tree {
      display: grid;
      gap: 5px;
      margin-top: 10px;
      max-height: 170px;
      overflow: auto;
    }

    .fork-tree-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 5px;
      align-items: center;
    }

    .fork-tree button {
      display: block;
      width: 100%;
      text-align: left;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .fork-tree button[aria-pressed="true"] {
      color: #111;
      background: #f4f1e8;
    }

    .generation-status {
      min-height: 18px;
      margin-top: 8px;
      color: rgb(255 255 255 / 68%);
      font-size: 0.76rem;
      line-height: 1.35;
    }

    .generation-mode {
      min-height: 17px;
      margin-top: 8px;
      color: rgb(255 255 255 / 58%);
      font-size: 0.74rem;
      line-height: 1.35;
    }

    .pnlm-controls-container {
      bottom: 18px;
    }

    .annotation-panel {
      position: fixed;
      left: 16px;
      bottom: 18px;
      z-index: 6;
      width: min(430px, calc(100vw - 32px));
      padding: 12px;
      border: 1px solid rgb(255 255 255 / 18%);
      border-radius: 8px;
      color: white;
      background: rgb(0 0 0 / 68%);
      box-shadow: 0 18px 50px rgb(0 0 0 / 38%);
      backdrop-filter: blur(14px);
    }

    .annotation-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .annotation-topbar strong {
      color: rgb(255 255 255 / 82%);
      font-size: 0.88rem;
    }

    .annotation-panel.is-collapsed {
      width: auto;
    }

    .annotation-panel.is-collapsed .annotation-topbar {
      margin-bottom: 0;
    }

    .annotation-panel.is-collapsed .annotation-body {
      display: none;
    }

    .annotation-body {
      max-height: min(68vh, 620px);
      overflow: auto;
    }

    .annotation-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }

    .annotation-actions button,
    .export-link {
      min-height: 34px;
      border: 1px solid rgb(255 255 255 / 20%);
      border-radius: 6px;
      padding: 0 12px;
      color: white;
      background: rgb(255 255 255 / 10%);
      font: inherit;
      font-size: 0.84rem;
      text-decoration: none;
      cursor: pointer;
    }

    .annotation-actions button:disabled,
    .export-link[aria-disabled="true"] {
      opacity: 0.42;
      cursor: not-allowed;
    }

    .annotation-actions button[data-active="true"] {
      color: #111;
      background: #f4f1e8;
    }

    .color-palette {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin: 0 0 10px;
    }

    .color-palette button {
      width: 28px;
      height: 28px;
      border: 2px solid rgb(255 255 255 / 36%);
      border-radius: 999px;
      padding: 0;
      background: var(--swatch);
      cursor: pointer;
    }

    .color-palette button[aria-pressed="true"] {
      border-color: #f4f1e8;
      box-shadow: 0 0 0 2px rgb(0 0 0 / 72%), 0 0 0 4px #f4f1e8;
    }

    .annotation-panel textarea {
      box-sizing: border-box;
      width: 100%;
      min-height: 76px;
      resize: vertical;
      border: 1px solid rgb(255 255 255 / 18%);
      border-radius: 6px;
      padding: 9px 10px;
      color: white;
      background: rgb(255 255 255 / 9%);
      font: inherit;
      font-size: 0.86rem;
    }

    .annotation-panel textarea + textarea {
      margin-top: 8px;
    }

    .annotation-readout {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-top: 10px;
      color: rgb(255 255 255 / 70%);
      font-size: 0.74rem;
    }

    .annotation-readout strong {
      display: block;
      margin-top: 2px;
      color: #f4f1e8;
      font-size: 0.85rem;
    }

    .coordinate-output {
      box-sizing: border-box;
      width: 100%;
      max-height: 92px;
      margin-top: 10px;
      overflow: auto;
      border: 1px solid rgb(255 255 255 / 12%);
      border-radius: 6px;
      padding: 8px;
      color: rgb(255 255 255 / 72%);
      background: rgb(0 0 0 / 32%);
      font: 0.72rem ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      white-space: pre-wrap;
    }

    .review-panel,
    .model-input-panel,
    .fov-panel {
      position: fixed;
      right: 16px;
      bottom: 18px;
      z-index: 6;
      width: min(46vw, 720px);
      max-height: calc(100vh - 36px);
      overflow: auto;
      padding: 12px;
      border: 1px solid rgb(255 255 255 / 18%);
      border-radius: 8px;
      color: white;
      background: rgb(0 0 0 / 70%);
      box-shadow: 0 18px 50px rgb(0 0 0 / 38%);
      backdrop-filter: blur(14px);
    }

    .review-panel h2,
    .model-input-panel h2,
    .fov-panel h2 {
      margin: 0 0 10px;
      font-size: 0.92rem;
      letter-spacing: 0;
    }

    .fov-control {
      display: grid;
      grid-template-columns: 104px 1fr 48px;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      color: rgb(255 255 255 / 72%);
      font-size: 0.78rem;
    }

    .fov-control input {
      width: 100%;
      accent-color: #f4f1e8;
    }

    .fov-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .fov-actions button {
      min-height: 34px;
      border: 1px solid rgb(255 255 255 / 20%);
      border-radius: 6px;
      padding: 0 12px;
      color: white;
      background: rgb(255 255 255 / 10%);
      font: inherit;
      font-size: 0.84rem;
      cursor: pointer;
    }

    .review-frame {
      position: relative;
      overflow: hidden;
      width: 100%;
      border: 1px solid rgb(255 255 255 / 14%);
      border-radius: 6px;
      background:
        linear-gradient(45deg, rgb(255 255 255 / 12%) 25%, transparent 25%),
        linear-gradient(-45deg, rgb(255 255 255 / 12%) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgb(255 255 255 / 12%) 75%),
        linear-gradient(-45deg, transparent 75%, rgb(255 255 255 / 12%) 75%);
      background-position: 0 0, 0 8px, 8px -8px, -8px 0;
      background-size: 16px 16px;
    }

    .review-full,
    .review-crop {
      display: block;
      user-select: none;
    }

    .review-full {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .review-crop {
      position: absolute;
      outline: 1px solid rgb(255 235 59 / 78%);
      pointer-events: none;
    }

    .review-scribble {
      position: absolute;
      pointer-events: none;
    }

    .opacity-controls {
      display: grid;
      grid-template-columns: 82px 1fr 42px;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
      color: rgb(255 255 255 / 72%);
      font-size: 0.78rem;
    }

    .opacity-controls input {
      width: 100%;
      accent-color: #f4f1e8;
    }

    .crop-output {
      box-sizing: border-box;
      width: 100%;
      max-height: 110px;
      margin: 10px 0 0;
      overflow: auto;
      border: 1px solid rgb(255 255 255 / 12%);
      border-radius: 6px;
      padding: 8px;
      color: rgb(255 255 255 / 72%);
      background: rgb(0 0 0 / 32%);
      font: 0.72rem ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      white-space: pre-wrap;
    }

    .model-input-output {
      box-sizing: border-box;
      width: 100%;
      max-height: calc(100vh - 120px);
      margin: 0;
      overflow: auto;
      border: 1px solid rgb(255 255 255 / 12%);
      border-radius: 6px;
      padding: 10px;
      color: rgb(255 255 255 / 78%);
      background: rgb(0 0 0 / 32%);
      font: 0.72rem ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      line-height: 1.45;
      white-space: pre-wrap;
    }

    @media (max-width: 680px) {
      .room-switcher,
      .image-switcher {
        width: 100%;
      }

      .room-switcher button,
      .image-switcher button {
        flex: 1;
        min-width: 0;
      }

      .annotation-panel {
        left: 12px;
        right: 12px;
        bottom: 12px;
        width: auto;
      }

      .annotation-body {
        max-height: 42vh;
      }

      .generation-panel {
        top: 66px;
        left: 12px;
        right: 12px;
        width: auto;
      }

      .viewer-controls:not(.is-collapsed) {
        width: calc(100vw - 40px);
      }

      .viewer-controls.is-collapsed,
      .generation-panel.is-collapsed {
        width: auto;
      }

      .generation-panel.is-collapsed {
        left: auto;
      }

      .review-panel,
      .model-input-panel,
      .fov-panel {
        left: 12px;
        right: 12px;
        width: auto;
      }

      .fov-control {
        grid-template-columns: 78px 1fr 44px;
      }
    }
  </style>
</head>
<body>
  <main id="panorama" aria-label="Panoramic renovation viewer"></main>
  <canvas id="draw-layer" aria-label="Outline drawing layer"></canvas>

  <header class="viewer-header">
    <div class="viewer-controls" id="viewer-controls">
      <div class="viewer-controls-topbar">
        <strong id="viewer-controls-title">Bathroom · Remodeled</strong>
        <button type="button" class="panel-toggle" id="viewer-controls-toggle">Minimize</button>
      </div>

      <div class="viewer-controls-body">
        <nav class="room-switcher" aria-label="Room">
          <button type="button" data-room="bathroom" aria-pressed="true">Bathroom</button>
          <button type="button" data-room="living-room" aria-pressed="false">Living Room</button>
        </nav>

        <nav class="image-switcher" aria-label="Panorama image">
          <button type="button" data-variant="original" aria-pressed="false">Original</button>
          <button type="button" data-variant="remodeled" aria-pressed="true">Remodeled</button>
        </nav>
      </div>
    </div>
  </header>

  <aside class="generation-panel" id="generation-panel" aria-label="Generation and version controls">
    <div class="generation-topbar">
      <strong>Versions</strong>
      <button type="button" class="panel-toggle" id="generation-panel-toggle">Minimize</button>
    </div>

    <div class="generation-body">
      <div class="generation-controls">
        <input id="upload-panorama" type="file" accept="image/*">
        <input id="api-key-input" type="password" autocomplete="off" placeholder="OpenAI API key">
        <button type="button" id="generate-edit" disabled>Generate</button>
      </div>
      <div class="generation-mode" id="generation-mode"></div>
      <div class="fork-tree" id="fork-tree" aria-label="Panorama versions"></div>
      <div class="generation-status" id="generation-status"></div>
    </div>
  </aside>

  <aside class="annotation-panel" id="annotation-panel" aria-label="Panorama annotation tools">
    <div class="annotation-topbar">
      <strong>Prompts</strong>
      <button type="button" class="panel-toggle" id="panel-toggle">Minimize</button>
    </div>

    <div class="annotation-body">
      <div class="annotation-actions">
        <button type="button" id="draw-toggle">Draw Outline</button>
        <button type="button" id="scribble-toggle" disabled>Draw Scribble</button>
        <button type="button" id="close-outline" hidden disabled>Close</button>
        <button type="button" id="clear-outline" disabled>Delete Region</button>
        <button type="button" id="export-crop" disabled>Export PNG</button>
        <button type="button" id="save-region" hidden disabled>Save Region</button>
        <button type="button" id="model-input-toggle">Model Input</button>
        <button type="button" id="fov-toggle">Image look wonky?</button>
        <button type="button" id="export-pack" disabled>Export Pack</button>
        <a class="export-link" id="download-crop" aria-disabled="true">Download Crop</a>
        <a class="export-link" id="download-scribble" aria-disabled="true">Download Scribbles</a>
        <a class="export-link" id="download-pack" aria-disabled="true">Download Pack</a>
      </div>

      <div class="color-palette" aria-label="Scribble color">
        <button type="button" data-color="#FF0000" style="--swatch: #FF0000" aria-label="Red" aria-pressed="true"></button>
        <button type="button" data-color="#000000" style="--swatch: #000000" aria-label="Black" aria-pressed="false"></button>
        <button type="button" data-color="#0000FF" style="--swatch: #0000FF" aria-label="Blue" aria-pressed="false"></button>
        <button type="button" data-color="#00FF00" style="--swatch: #00FF00" aria-label="Green" aria-pressed="false"></button>
        <button type="button" data-color="#FFFF00" style="--swatch: #FFFF00" aria-label="Yellow" aria-pressed="false"></button>
        <button type="button" data-color="#FFFFFF" style="--swatch: #FFFFFF" aria-label="White" aria-pressed="false"></button>
        <button type="button" data-color="#FF00FF" style="--swatch: #FF00FF" aria-label="Magenta" aria-pressed="false"></button>
        <button type="button" data-color="#00FFFF" style="--swatch: #00FFFF" aria-label="Cyan" aria-pressed="false"></button>
      </div>

      <textarea id="general-prompt" placeholder="General prompt for the whole panorama"></textarea>
      <textarea id="region-prompt" placeholder="Describe the change for this outlined area"></textarea>

      <div class="annotation-readout">
        <div>
          Points
          <strong id="point-count">0</strong>
        </div>
        <div>
          View yaw
          <strong id="view-yaw">0.0</strong>
        </div>
        <div>
          View pitch
          <strong id="view-pitch">0.0</strong>
        </div>
        <div>
          Saved
          <strong id="region-count">0</strong>
        </div>
      </div>

      <pre class="coordinate-output" id="coordinate-output">[]</pre>
    </div>
  </aside>

  <aside class="review-panel" id="review-panel" aria-label="Panorama crop verification" hidden>
    <h2>Crop Check</h2>
    <div class="review-frame" id="review-frame">
      <img class="review-full" id="review-full" alt="Full source panorama">
      <img class="review-crop" id="review-crop" alt="Transparent extracted crop">
      <img class="review-scribble" id="review-scribble" alt="Transparent scribble layer">
    </div>

    <label class="opacity-controls" for="full-opacity">
      Full
      <input id="full-opacity" type="range" min="0" max="1" value="0.45" step="0.01">
      <output id="full-opacity-value" for="full-opacity">45%</output>
    </label>

    <label class="opacity-controls" for="crop-opacity">
      Crop
      <input id="crop-opacity" type="range" min="0" max="1" value="1" step="0.01">
      <output id="crop-opacity-value" for="crop-opacity">100%</output>
    </label>

    <pre class="crop-output" id="crop-output"></pre>
  </aside>

  <aside class="model-input-panel" id="model-input-panel" aria-label="Generated model input" hidden>
    <h2>Model Input</h2>
    <pre class="model-input-output" id="model-input-output"></pre>
  </aside>

  <aside class="fov-panel" id="fov-panel" aria-label="Image geometry controls" hidden>
    <h2>Image Geometry</h2>

    <label class="fov-control" for="radial-fov">
      Radial
      <input id="radial-fov" type="range" min="180" max="360" value="290" step="1">
      <output id="radial-fov-value" for="radial-fov">290 deg</output>
    </label>

    <label class="fov-control" for="top-fov">
      Top
      <input id="top-fov" type="range" min="-20" max="90" value="42" step="1">
      <output id="top-fov-value" for="top-fov">42 deg</output>
    </label>

    <label class="fov-control" for="bottom-fov">
      Bottom
      <input id="bottom-fov" type="range" min="-90" max="20" value="-53" step="1">
      <output id="bottom-fov-value" for="bottom-fov">-53 deg</output>
    </label>

    <div class="fov-actions">
      <button type="button" id="fov-reset">Reset</button>
      <button type="button" id="fov-close">Done</button>
    </div>
  </aside>

  <script>
    const baseSceneSettings = {
      haov: 290,
      vaov: 95,
      vOffset: -5.5
    };
    const generationProxyUrl = (window.PANORENO_GENERATION_PROXY_URL || "").trim().replace(/\/$/, "");
    const publicGenerationLimit = 5;

    const panoramas = {
      original: {
        label: "Original",
        room: "bathroom",
        variant: "original",
        src: "assets/original.jpeg",
        ...baseSceneSettings
      },
      remodeled: {
        label: "Remodeled",
        room: "bathroom",
        variant: "remodeled",
        src: "assets/remodeled.png",
        ...baseSceneSettings
      },
      "living-original": {
        label: "Living Room Original",
        room: "living-room",
        variant: "original",
        src: "assets/img-6046.jpg",
        ...baseSceneSettings
      },
      "living-remodeled": {
        label: "Living Room Remodeled",
        room: "living-room",
        variant: "remodeled",
        src: "assets/latest-download.png",
        ...baseSceneSettings
      }
    };

    const roomPanoramas = {
      bathroom: {
        label: "Bathroom",
        original: "original",
        remodeled: "remodeled"
      },
      "living-room": {
        label: "Living Room",
        original: "living-original",
        remodeled: "living-remodeled"
      }
    };

    const panoramaVersions = [
      {
        id: "original",
        parentId: null,
        label: "Original",
        kind: "base",
        createdAt: Date.now()
      },
      {
        id: "remodeled",
        parentId: "original",
        label: "Remodeled",
        kind: "base",
        createdAt: Date.now()
      },
      {
        id: "living-original",
        parentId: null,
        label: "Living Room Original",
        kind: "base",
        createdAt: Date.now()
      },
      {
        id: "living-remodeled",
        parentId: "living-original",
        label: "Living Room Remodeled",
        kind: "base",
        createdAt: Date.now()
      }
    ];

    let viewer;
    let currentPanorama = "remodeled";
    let currentRoom = "bathroom";

      let depth = 0;

      while (version && version.parentId) {
        depth += 1;
        version = getVersion(version.parentId);
      }

      return depth;
    }

    function getOrderedVersions() {
      const children = new Map();
      const roots = [];

      panoramaVersions.forEach((version) => {
        if (!version.parentId) {
          roots.push(version);
          return;
        }

        if (!children.has(version.parentId)) {
          children.set(version.parentId, []);
        }

        children.get(version.parentId).push(version);
      });

      const ordered = [];
      const visit = (version) => {
        ordered.push(version);
        (children.get(version.id) || []).forEach(visit);
      };

      roots.forEach(visit);

      return ordered;
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function getSignedAngleDelta(value) {
      return ((((value + 180) % 360) + 360) % 360) - 180;
    }

    function getSceneTop(scene) {
      return (scene.vOffset || 0) + (scene.vaov / 2);

      scene.haov = Number(radialFov.value);
      scene.vaov = top - bottom;
      scene.vOffset = (top + bottom) / 2;

    function loadSourceImage(scene) {
      if (imageCache[scene.src]) {
        return Promise.resolve(imageCache[scene.src]);
      }

      return new Promise((resolve, reject) => {
        const image = new Image();

        image.addEventListener("load", () => {
          imageCache[scene.src] = image;
          resolve(image);
        });

        image.addEventListener("error", () => {
          reject(new Error(`Could not load ${scene.src}`));
        });

        image.src = scene.src;
      });
    }

    function yawPitchToImagePoint(point, scene, image) {
      const centerYaw = scene.hOffset || 0;
      const yawDelta = getSignedAngleDelta(point.yaw - centerYaw);
      const topPitch = scene.vOffset + (scene.vaov / 2);

      return {
        x: clamp(((yawDelta + (scene.haov / 2)) / scene.haov) * image.naturalWidth, 0, image.naturalWidth),
        y: clamp(((topPitch - point.pitch) / scene.vaov) * image.naturalHeight, 0, image.naturalHeight),
        pitch: point.pitch,
        yaw: point.yaw
      };
    }

    function getSourceBoundingBox(sourcePoints, image) {
      const xs = sourcePoints.map((point) => point.x);
      const ys = sourcePoints.map((point) => point.y);
      const padding = 8;

      return {
        left: clamp(Math.floor(Math.min(...xs) - padding), 0, image.naturalWidth),
        top: clamp(Math.floor(Math.min(...ys) - padding), 0, image.naturalHeight),
        right: clamp(Math.ceil(Math.max(...xs) + padding), 0, image.naturalWidth),
        bottom: clamp(Math.ceil(Math.max(...ys) + padding), 0, image.naturalHeight)
      };
    }

    function canvasToPngBlob(canvas) {
      return new Promise((resolve, reject) => {
        canvas.toBlob((blob) => {
          if (!blob) {
            reject(new Error("Could not create PNG export"));
            return;
          }

          resolve(blob);
        }, "image/png");
      });
    }

    function getFileExtension(path) {
      const match = path.match(/\.([a-z0-9]+)(?:$|\?)/i);

      return match ? match[1].toLowerCase() : "png";
    }

    function getOneCallTargetSize(width, height) {
      const targetWidth = Math.min(3840, Math.floor(width / 16) * 16);
      const scaledHeight = Math.round((height * targetWidth) / width);
      const targetHeight = Math.round(scaledHeight / 16) * 16;

      return {
        width: targetWidth,
        height: targetHeight
      };
    }

    function getOneCallPrompt(regions) {
      const regionLines = regions.length > 0
        ? regions.map((region, index) => {
          const color = regionGuideColors[index % regionGuideColors.length];

          return `- ${color} outlined region (${region.id}): ${region.prompt || ""}`;
        }).join("\n")
        : "- No saved regions yet.";

      return `You are editing a room renovation panorama in one pass.

Image 1 is the full panorama to edit.
Image 2 is a transparent guidance overlay. It contains colored outlines for each editable region, plus any user scribbles inside those regions. The colored outlines and scribbles are instructions only; do not draw those colored marks in the final image.

Use the provided mask for Image 1. Transparent pixels in the mask are editable. Opaque pixels must be preserved.

General panorama goal:
${generalPrompt.value.trim()}

Region-specific instructions:
${regionLines}

Constraints:
- Produce one complete edited panorama image.
- Change only the transparent masked regions.
- Preserve the camera perspective, room geometry, walls, floor, ceiling, lighting direction, and all opaque/unmasked content.
- Match materials and lighting across the whole panorama so the result can replace Image 1.
- Treat the guidance overlay as visual intent only. Do not include colored outlines, colored scribbles, labels, watermarks, or extra text in the final output.`;
    }

    async function getModelInputText() {

          sourcePackScribbles: `regions/${region.metadata.id}/scribbles.png`
        }
      }));
      const prompt = getOneCallPrompt(regions);

      return JSON.stringify({
        endpoint: "POST /v1/images/edits",
        model: "gpt-image-2",
        requestShape: "multipart/form-data",

        },
        sourceImage: {

    async function fetchSourceBlob(scene) {
      const response = await fetch(scene.src);

      if (!response.ok) {
        throw new Error(`Could not fetch ${scene.src}`);
      }

      return response.blob();
    }

    function traceScaledPolygon(context, polygon, scaleX, scaleY) {
      if (polygon.length === 0) {
        return;
      }

      context.beginPath();
      context.moveTo(polygon[0].x * scaleX, polygon[0].y * scaleY);

      polygon.slice(1).forEach((point) => {
        context.lineTo(point.x * scaleX, point.y * scaleY);
      });

      context.closePath();
    }

    function base64ToBlob(base64, type = "image/png") {
      const bytes = atob(base64);
      const chunks = [];
      const chunkSize = 1024;

      for (let offset = 0; offset < bytes.length; offset += chunkSize) {
        const slice = bytes.slice(offset, offset + chunkSize);
        const numbers = new Array(slice.length);

        for (let index = 0; index < slice.length; index += 1) {
          numbers[index] = slice.charCodeAt(index);
        }

        chunks.push(new Uint8Array(numbers));
      }

      return new Blob(chunks, { type });
    }

    async function getRegionsForGeneration() {
      const regions = [...savedRegions];

      if (isClosed) {
        regions.push(await buildCurrentRegionExport(`current-region-${Date.now()}`));
      }

      return regions;
    }

    async function createOneCallEditAssets(regionsForEdit) {
      const scene = getCurrentScene();
      const image = await loadSourceImage(scene);
      const targetSize = getOneCallTargetSize(image.naturalWidth, image.naturalHeight);
      const scaleX = targetSize.width / image.naturalWidth;
      const scaleY = targetSize.height / image.naturalHeight;
      const sourceCanvas = document.createElement("canvas");
      const maskCanvas = document.createElement("canvas");
      const guideCanvas = document.createElement("canvas");
      const canvases = [sourceCanvas, maskCanvas, guideCanvas];
      const regions = regionsForEdit.map((region) => region.metadata);

      canvases.forEach((canvas) => {
        canvas.width = targetSize.width;
        canvas.height = targetSize.height;
      });

      sourceCanvas
        .getContext("2d")
        .drawImage(image, 0, 0, targetSize.width, targetSize.height);

      const maskContext = maskCanvas.getContext("2d");
      maskContext.fillStyle = "#FFFFFF";
      maskContext.fillRect(0, 0, targetSize.width, targetSize.height);
      maskContext.globalCompositeOperation = "destination-out";
      regions.forEach((region) => {
        traceScaledPolygon(maskContext, region.polygon, scaleX, scaleY);
        maskContext.fill();
      });
      maskContext.globalCompositeOperation = "source-over";

      const guideContext = guideCanvas.getContext("2d");
      const outlineWidth = Math.max(5, Math.round(targetSize.width / 760));
      const scribbleWidth = Math.max(7, Math.round(targetSize.width / 560));

      regions.forEach((region, index) => {
        const color = regionGuideColors[index % regionGuideColors.length];

        guideContext.save();
        guideContext.lineJoin = "round";
        guideContext.lineCap = "round";
        guideContext.lineWidth = outlineWidth;
        guideContext.strokeStyle = color;
        traceScaledPolygon(guideContext, region.polygon, scaleX, scaleY);
        guideContext.stroke();
        guideContext.restore();

        renderScribbles(
          guideContext,
          region.scribbles,
          (point) => ({
            x: point.x * scaleX,
            y: point.y * scaleY
          }),
          scribbleWidth
        );
      });

      const promptRegions = regions.map((region) => ({
        id: region.id,
        prompt: region.prompt
      }));

      return {
        targetSize,
        prompt: getOneCallPrompt(promptRegions),
        blobs: {
          source: await canvasToPngBlob(sourceCanvas),
          guide: await canvasToPngBlob(guideCanvas),
          mask: await canvasToPngBlob(maskCanvas)
        }
      };
    }

    function createImageEditFormData(assets) {
      const formData = new FormData();
      const size = `${assets.targetSize.width}x${assets.targetSize.height}`;

      formData.append("model", "gpt-image-2");
      formData.append("image[]", assets.blobs.source, `source-${size}.png`);
      formData.append("image[]", assets.blobs.guide, `region-guide-${size}.png`);
      formData.append("mask", assets.blobs.mask, `mask-edit-area-${size}.png`);
      formData.append("prompt", assets.prompt);
      formData.append("quality", "high");
      formData.append("size", size);
      formData.append("output_format", "png");

      return formData;
    }

    async function requestImageEdit(assets, apiKey) {
      const formData = createImageEditFormData(assets);
      const response = isHostedGenerationConfigured()
        ? await fetch(`${generationProxyUrl}/edit`, {
          method: "POST",
          body: formData
        })
        : await fetch("https://api.openai.com/v1/images/edits", {
          method: "POST",
          headers: {
            Authorization: `Bearer ${apiKey}`
          },
          body: formData
        });
      const payload = await response.json().catch(() => ({}));

      if (!response.ok) {
        throw new Error(payload.error?.message || `Image edit failed with HTTP ${response.status}`);
      }

      if (payload.data?.[0]?.b64_json) {
        return {
          blob: base64ToBlob(payload.data[0].b64_json),
          limit: response.headers.get("x-panoreno-limit"),
          remaining: response.headers.get("x-panoreno-remaining")
        };
      }

      if (payload.data?.[0]?.url) {
        const imageResponse = await fetch(payload.data[0].url);

        if (!imageResponse.ok) {
          throw new Error("Image edit succeeded, but the generated image could not be fetched");
        }

        return {
          blob: await imageResponse.blob(),
          limit: response.headers.get("x-panoreno-limit"),
          remaining: response.headers.get("x-panoreno-remaining")
        };
      }

      throw new Error("Image edit response did not include image data");
    }

    async function generateCurrentEdit() {
      const apiKey = apiKeyInput.value.trim();
      const parentId = currentPanorama;

      if (!isHostedGenerationConfigured() && !apiKey) {
        setGenerationStatus("Enter an OpenAI API key before generating.", true);
        updateGenerateButton();
        return;
      }

      if (savedRegions.length === 0 && !isClosed) {
        setGenerationStatus("Draw an outline and click near its starting point to create a region before generating.", true);
        updateGenerateButton();
        return;
      }

      isGenerating = true;
      updateGenerateButton();
      generateEdit.textContent = "Generating...";
      setGenerationStatus("Preparing edit assets...");

      try {
        const regionsForEdit = await getRegionsForGeneration();
        const assets = await createOneCallEditAssets(regionsForEdit);
        setGenerationStatus(`Generating ${assets.targetSize.width}x${assets.targetSize.height} edit...`);

        const result = await requestImageEdit(assets, apiKey);
        const editedBlob = result.blob;
        const editedUrl = URL.createObjectURL(editedBlob);
        const parentLabel = panoramas[parentId].label;
        const label = `${parentLabel} fork ${generatedVersionNumber}`;
        const versionId = addPanoramaVersion({
          label,
          src: editedUrl,
          parentId,
          kind: "fork"
        });

        generatedVersionNumber += 1;
        loadPanorama(versionId);
        if (result.remaining !== null && result.limit !== null) {
          generationMode.textContent = `Public demo mode: ${result.remaining}/${result.limit} hosted generations remaining.`;
        }
        setGenerationStatus(result.remaining === null
          ? `Generated ${label}.`
          : `Generated ${label}. ${result.remaining} hosted generations remaining.`);
      } catch (error) {
        setGenerationStatus(error.message, true);
      } finally {
        isGenerating = false;
        generateEdit.textContent = "Generate";
        updateGenerateButton();
      }
    }

    function handlePanoramaUpload(event) {
      const file = event.target.files?.[0];

      if (!file) {
        return;

      const src = URL.createObjectURL(file);
      const rawLabel = file.name ? file.name.replace(/\.[^.]+$/, "") : `Upload ${uploadedVersionNumber}`;
      const label = `Upload ${uploadedVersionNumber}: ${rawLabel}`;
      const versionId = addPanoramaVersion({
        label,
        src,
        parentId: null,
        kind: "upload"
      });

      uploadedVersionNumber += 1;
      loadPanorama(versionId);
      setGenerationStatus(`Loaded ${label}.`);
      uploadPanorama.value = "";
    }

    function syncViewerInteraction() {

    function resizeDrawCanvas() {

    function updateAnnotationUi() {
      const hasDraftOutline = points.length > 0 || activeTool === "outline";
      const canDelete = hasDraftOutline || Boolean(selectedRegionId);

      pointCount.textContent = points.length;

      scribbleToggle.dataset.active = String(activeTool === "scribble");
      drawToggle.textContent = activeTool === "outline" ? "Drawing..." : "Draw Outline";
      scribbleToggle.textContent = activeTool === "scribble" ? "Stop Scribble" : "Draw Scribble";
      clearOutline.textContent = hasDraftOutline ? "Cancel Outline" : "Delete Region";

      if (viewer) {
        viewYaw.textContent = viewer.getYaw().toFixed(1);
        viewPitch.textContent = viewer.getPitch().toFixed(1);
      }

      coordinateOutput.textContent = JSON.stringify(points.map((point) => ({
        x: Math.round(point.x),
        y: Math.round(point.y),
        pitch: Number(point.pitch.toFixed(3)),
        yaw: Number(point.yaw.toFixed(3))
      })), null, 2);
    }

    function renderScribbles(context, strokes, mapper = (point) => point, lineWidth = 6) {
      strokes.forEach((stroke) => {
        if (stroke.points.length === 0) {
          return;
        }

        context.save();
        context.lineCap = "round";
        context.lineJoin = "round";
        context.lineWidth = lineWidth;
        context.strokeStyle = stroke.color;
        context.beginPath();

        const firstPoint = mapper(stroke.points[0]);
        context.moveTo(firstPoint.x, firstPoint.y);

        stroke.points.slice(1).forEach((point) => {
          const mappedPoint = mapper(point);
          context.lineTo(mappedPoint.x, mappedPoint.y);
        });

        context.stroke();
        context.restore();
      });
    }

    function yawPitchToScreenPoint(point) {
      if (!viewer) {
        return {
          x: point.x,
          y: point.y
        };
      }

      const width = window.innerWidth;
      const height = window.innerHeight;
      const yawDelta = getSignedAngleDelta(point.yaw - viewer.getYaw()) * (Math.PI / 180);
      const pitch = point.pitch * (Math.PI / 180);
      const viewPitch = viewer.getPitch() * (Math.PI / 180);
      const horizontalFov = viewer.getHfov() * (Math.PI / 180);
      const focalLength = (width / 2) / Math.tan(horizontalFov / 2);
      const cosPitch = Math.cos(pitch);
      const x = cosPitch * Math.sin(yawDelta);
      const y = Math.sin(pitch);
      const z = cosPitch * Math.cos(yawDelta);
      const cameraY = (y * Math.cos(viewPitch)) - (z * Math.sin(viewPitch));
      const cameraZ = (y * Math.sin(viewPitch)) + (z * Math.cos(viewPitch));

      if (cameraZ <= 0.02) {
        return undefined;
      }

      return {
        x: (width / 2) + ((x / cameraZ) * focalLength),
        y: (height / 2) - ((cameraY / cameraZ) * focalLength)
      };
    }

    function getProjectedPoints(regionPoints) {
      const projected = regionPoints.map(yawPitchToScreenPoint);

      if (projected.some((point) => !point)) {
        return [];
      }

      return projected;
    }

    function drawPolygonOverlay(screenPoints, color, fillAlpha = 0.14, lineWidth = 3) {
      if (screenPoints.length < 3) {
        return;
      }

      drawContext.save();
      drawContext.lineJoin = "round";
      drawContext.lineWidth = lineWidth;
      drawContext.strokeStyle = color;
      drawContext.fillStyle = color;
      drawContext.globalAlpha = fillAlpha;
      drawContext.beginPath();
      drawContext.moveTo(screenPoints[0].x, screenPoints[0].y);
      screenPoints.slice(1).forEach((point) => {
        drawContext.lineTo(point.x, point.y);
      });
      drawContext.closePath();
      drawContext.fill();
      drawContext.globalAlpha = 1;
      drawContext.stroke();
      drawContext.restore();
    }

    function screenPointIsInsidePolygon(point, polygon) {
      if (polygon.length < 3) {
        return false;
      }

      let inside = false;

      for (let index = 0, previousIndex = polygon.length - 1; index < polygon.length; previousIndex = index++) {
        const current = polygon[index];
        const previous = polygon[previousIndex];
        const intersects = ((current.y > point.y) !== (previous.y > point.y))
          && (point.x < ((previous.x - current.x) * (point.y - current.y)) / (previous.y - current.y) + current.x);

        if (intersects) {
          inside = !inside;
        }
      }

      return inside;
    }

    function renderProjectedScribbles(strokes, lineWidth = 6) {
      strokes.forEach((stroke) => {
        drawContext.save();
        drawContext.lineCap = "round";
        drawContext.lineJoin = "round";
        drawContext.lineWidth = lineWidth;
        drawContext.strokeStyle = stroke.color;
        drawContext.beginPath();

        let isDrawingSegment = false;

        stroke.points.forEach((point) => {
          const screenPoint = yawPitchToScreenPoint(point);

          if (!screenPoint) {
            isDrawingSegment = false;
            return;
          }

          if (!isDrawingSegment) {
            drawContext.moveTo(screenPoint.x, screenPoint.y);
            isDrawingSegment = true;
            return;
          }

          drawContext.lineTo(screenPoint.x, screenPoint.y);
        });

        drawContext.stroke();
        drawContext.restore();
      });
    }

    function renderSavedRegions() {
      savedRegions.forEach((region, index) => {
        const color = regionGuideColors[index % regionGuideColors.length];
        const screenPoints = getProjectedPoints(region.metadata.polygon);
        const isSelected = region.metadata.id === selectedRegionId;

        drawPolygonOverlay(screenPoints, isSelected ? "#FFFFFF" : color, isSelected ? 0.22 : 0.14, isSelected ? 5 : 3);
        renderProjectedScribbles(region.metadata.scribbles, isSelected ? 7 : 5);
      });
    }

    function getActiveScreenPoints() {
      return getProjectedPoints(points);
    }

    function getRegionAtScreenPoint(point) {
      for (let index = savedRegions.length - 1; index >= 0; index -= 1) {
        const region = savedRegions[index];
        const screenPoints = getProjectedPoints(region.metadata.polygon);

        if (screenPointIsInsidePolygon(point, screenPoints)) {
          return region;
        }
      }

      return undefined;
    }

    function refreshOpenModelInput() {
      if (modelInputPanel.hidden) {
        return;
      }

      getModelInputText()
        .then((text) => {
          modelInputOutput.textContent = text;
        })
        .catch((error) => {
          modelInputOutput.textContent = error.message;
        });
    }

    function selectSavedRegion(region) {
      selectedRegionId = region.metadata.id;
      regionPrompt.value = region.metadata.prompt || "";
      activeTool = "none";
      syncViewerInteraction();
      setGenerationStatus(`Selected ${region.metadata.id}. Edit the region prompt below.`);
      saveAnnotationState();
      renderOutline();
      refreshOpenModelInput();
    }

    function updateSelectedRegionPrompt() {
      if (!selectedRegionId) {
        return;
      }

      const selectedRegion = savedRegions.find((region) => region.metadata.id === selectedRegionId);

      if (!selectedRegion) {
        selectedRegionId = undefined;
        return;
      }

      selectedRegion.metadata.prompt = regionPrompt.value.trim();
      resetPackDownload();
      saveAnnotationState();
      renderOutline();
      refreshOpenModelInput();
    }

    function isNearOutlineStart(point) {
      if (points.length < 3) {
        return false;
      }

      const startPoint = yawPitchToScreenPoint(points[0]);

      if (!startPoint) {
        return false;
      }

      return Math.hypot(point.x - startPoint.x, point.y - startPoint.y) <= closeOutlineRadius;
    }

    function resetDraftOutline() {
      points = [];
      scribbleStrokes = [];
      currentStroke = undefined;
      isClosed = false;
      activeTool = "none";
      resetReview();
      downloadCrop.removeAttribute("href");
      downloadCrop.removeAttribute("download");
      downloadCrop.setAttribute("aria-disabled", "true");
      downloadScribble.removeAttribute("href");
      downloadScribble.removeAttribute("download");
      downloadScribble.setAttribute("aria-disabled", "true");
    }

    async function commitCurrentOutline() {
      if (points.length < 3) {
        return;
      }

      isClosed = true;
      activeTool = "none";
      syncViewerInteraction();
      renderOutline();

      const regionId = `region-${String(nextRegionNumber).padStart(3, "0")}`;

      try {
        const region = await buildCurrentRegionExport(regionId);
        savedRegions.push(region);
        nextRegionNumber += 1;
        resetPackDownload();
        resetDraftOutline();
        selectSavedRegion(region);
        setGenerationStatus(`Created ${region.metadata.id}. Add or edit its prompt below.`);
      } catch (error) {
        cropOutput.textContent = error.message;
        reviewPanel.hidden = false;
      } finally {
        updateAnnotationUi();
      }
    }

    function deleteSelectedRegionOrDraft() {
      if (points.length > 0 || activeTool === "outline") {
        resetDraftOutline();
        syncViewerInteraction();
        renderOutline();
        updateAnnotationUi();
        return;
      }

      if (!selectedRegionId) {
        return;
      }

      const deletedRegionId = selectedRegionId;
      savedRegions = savedRegions.filter((region) => region.metadata.id !== selectedRegionId);
      selectedRegionId = undefined;
      regionPrompt.value = "";
      resetPackDownload();
      saveAnnotationState();
      renderOutline();
      refreshOpenModelInput();
      updateAnnotationUi();
      setGenerationStatus(`Deleted ${deletedRegionId}.`);
    }

    function renderOutline() {
      drawContext.clearRect(0, 0, window.innerWidth, window.innerHeight);
      renderSavedRegions();

      if (points.length === 0) {
        updateAnnotationUi();
        return;
      }

      const activeScreenPoints = getActiveScreenPoints();

      if (activeScreenPoints.length === 0) {
        updateAnnotationUi();
        return;
      }

      drawContext.lineWidth = 3;
      drawContext.strokeStyle = "#f4f1e8";
      drawContext.fillStyle = "rgb(244 241 232 / 18%)";
      drawContext.beginPath();
      drawContext.moveTo(activeScreenPoints[0].x, activeScreenPoints[0].y);

      activeScreenPoints.slice(1).forEach((point) => {
        drawContext.lineTo(point.x, point.y);
      });

      if (isClosed) {
        drawContext.closePath();
        drawContext.fill();
      }

      drawContext.stroke();

      renderProjectedScribbles(scribbleStrokes);

      activeScreenPoints.forEach((point, index) => {
        const canCloseFromStart = index === 0 && activeTool === "outline" && points.length >= 3;

        drawContext.beginPath();
        drawContext.arc(point.x, point.y, canCloseFromStart ? closeOutlineRadius : 5, 0, Math.PI * 2);
        drawContext.fillStyle = canCloseFromStart ? "rgb(244 241 232 / 18%)" : "#f4f1e8";
        drawContext.fill();
        drawContext.strokeStyle = canCloseFromStart ? "#f4f1e8" : "#111";
        drawContext.lineWidth = canCloseFromStart ? 3 : 1.5;
        drawContext.stroke();
      });

      updateAnnotationUi();
    }

    function clearAnnotation({ clearSaved = false } = {}) {
      points = [];
      scribbleStrokes = [];
      currentStroke = undefined;
      isClosed = false;
      activeTool = "none";
      selectedRegionId = undefined;
      resetReview();
      regionPrompt.value = "";
      downloadCrop.removeAttribute("href");
      downloadCrop.removeAttribute("download");
      downloadCrop.setAttribute("aria-disabled", "true");
      downloadScribble.removeAttribute("href");
      downloadScribble.removeAttribute("download");
      downloadScribble.setAttribute("aria-disabled", "true");

      if (clearSaved) {
        savedRegions = [];
        nextRegionNumber = 1;
        resetPackDownload();
      }

      if (!modelInputPanel.hidden) {
        getModelInputText()
          .then((text) => {
            modelInputOutput.textContent = text;
          })
          .catch((error) => {
            modelInputOutput.textContent = error.message;
          });
      }

      syncViewerInteraction();
      renderOutline();
    }

    function setTool(nextTool) {
      activeTool = activeTool === nextTool ? "none" : nextTool;

      if (activeTool === "outline") {
        selectedRegionId = undefined;
        regionPrompt.value = "";
      }

      syncViewerInteraction();
      renderOutline();
      updateAnnotationUi();
    }

    function getCanvasPoint(event) {
      const rect = drawCanvas.getBoundingClientRect();
      const x = event.clientX - rect.left;
      const y = event.clientY - rect.top;
      const coords = viewer && typeof viewer.mouseEventToCoords === "function"
        ? viewer.mouseEventToCoords(event)
        : [viewer ? viewer.getPitch() : 0, viewer ? viewer.getYaw() : 0];

      return {
        x,
        y,
        pitch: coords[0],
        yaw: coords[1]
      };
    }

    function pointIsInsideOutline(point) {
      if (points.length < 3) {
        return false;
      }

      const outlinePoints = getActiveScreenPoints();

      if (outlinePoints.length < 3) {
        return false;
      }

      return screenPointIsInsidePolygon(point, outlinePoints);
    }

    function traceSourcePolygon(context, sourcePoints, box) {
      context.beginPath();
      context.moveTo(sourcePoints[0].x - box.left, sourcePoints[0].y - box.top);
      sourcePoints.slice(1).forEach((point) => {
        context.lineTo(point.x - box.left, point.y - box.top);
      });
      context.closePath();
    }

    function createRegionCanvases(image, sourcePoints, box, scene) {
      const width = Math.max(1, box.right - box.left);
      const height = Math.max(1, box.bottom - box.top);
      const original = document.createElement("canvas");
      const cutout = document.createElement("canvas");
      const mask = document.createElement("canvas");
      const scribbles = document.createElement("canvas");
      const canvases = [original, cutout, mask, scribbles];

      canvases.forEach((canvas) => {
        canvas.width = width;
        canvas.height = height;
      });

      original.getContext("2d").drawImage(image, box.left, box.top, width, height, 0, 0, width, height);

      const cutoutContext = cutout.getContext("2d");
      cutoutContext.save();
      traceSourcePolygon(cutoutContext, sourcePoints, box);
      cutoutContext.clip();
      cutoutContext.drawImage(image, box.left, box.top, width, height, 0, 0, width, height);
      cutoutContext.restore();

      const maskContext = mask.getContext("2d");
      maskContext.fillStyle = "#FFFFFF";
      maskContext.fillRect(0, 0, width, height);
      maskContext.globalCompositeOperation = "destination-out";
      traceSourcePolygon(maskContext, sourcePoints, box);
      maskContext.fill();
      maskContext.globalCompositeOperation = "source-over";

      renderScribbles(
        scribbles.getContext("2d"),
        scribbleStrokes,
        (point) => {
          const imagePoint = yawPitchToImagePoint(point, scene, image);

          return {
            x: imagePoint.x - box.left,
            y: imagePoint.y - box.top
          };
        },
        Math.max(6, Math.round(image.naturalWidth / 600))
      );

      return {
        original,
        cutout,
        mask,
        scribbles,
        width,
        height
      };
    }

    async function buildCurrentRegionExport(regionId) {
      const scene = panoramas[currentPanorama];

      if (!isClosed) {
        throw new Error("Close an outline before exporting");
      }

      const image = await loadSourceImage(scene);
      const sourcePoints = points.map((point) => yawPitchToImagePoint(point, scene, image));
      const box = getSourceBoundingBox(sourcePoints, image);
      const canvases = createRegionCanvases(image, sourcePoints, box, scene);
      const [originalBlob, cutoutBlob, maskBlob, scribbleBlob] = await Promise.all([
        canvasToPngBlob(canvases.original),
        canvasToPngBlob(canvases.cutout),
        canvasToPngBlob(canvases.mask),
        canvasToPngBlob(canvases.scribbles)
      ]);

      return {
        metadata: {
          id: regionId,
          sceneKey: currentPanorama,
          source: scene.src,
          prompt: regionPrompt.value.trim(),
          image: {
            width: image.naturalWidth,
            height: image.naturalHeight
          },
          crop: {
            x: box.left,
            y: box.top,
            width: canvases.width,
            height: canvases.height
          },
          mask: {
            meaning: "transparent pixels are the editable polygon; opaque pixels are preserved"
          },
          scribbles: scribbleStrokes.map((stroke) => ({
            color: stroke.color,
            points: stroke.points.map((point) => {
              const imagePoint = yawPitchToImagePoint(point, scene, image);

              return {
                x: Math.round(imagePoint.x),
                y: Math.round(imagePoint.y),
                yaw: Number(point.yaw.toFixed(3)),
                pitch: Number(point.pitch.toFixed(3))
              };
            })
          })),
          polygon: sourcePoints.map((point) => ({
            x: Math.round(point.x),
            y: Math.round(point.y),
            yaw: Number(point.yaw.toFixed(3)),
            pitch: Number(point.pitch.toFixed(3))
          }))
        },
        blobs: {
          original: originalBlob,
          cutout: cutoutBlob,
          mask: maskBlob,
          scribbles: scribbleBlob
        }
      };
    }

    function showRegionExport(region) {
      const scene = panoramas[region.metadata.sceneKey];
      const { image, crop } = region.metadata;

      currentExport = region;

      if (cropObjectUrl) {
        URL.revokeObjectURL(cropObjectUrl);
      }

      if (scribbleObjectUrl) {
        URL.revokeObjectURL(scribbleObjectUrl);
      }

      cropObjectUrl = URL.createObjectURL(region.blobs.cutout);
      scribbleObjectUrl = URL.createObjectURL(region.blobs.scribbles);
      downloadCrop.href = cropObjectUrl;
      downloadCrop.download = `${region.metadata.id}-crop-cutout.png`;
      downloadCrop.removeAttribute("aria-disabled");
      downloadScribble.href = scribbleObjectUrl;
      downloadScribble.download = `${region.metadata.id}-scribbles.png`;
      downloadScribble.removeAttribute("aria-disabled");

      reviewPanel.hidden = false;
      reviewFrame.style.aspectRatio = `${image.width} / ${image.height}`;
      reviewFull.src = scene.src;
      reviewCrop.src = cropObjectUrl;
      reviewScribble.src = scribbleObjectUrl;
      reviewCrop.style.left = `${(crop.x / image.width) * 100}%`;
      reviewCrop.style.top = `${(crop.y / image.height) * 100}%`;
      reviewCrop.style.width = `${(crop.width / image.width) * 100}%`;
      reviewCrop.style.height = `${(crop.height / image.height) * 100}%`;
      reviewScribble.style.left = reviewCrop.style.left;
      reviewScribble.style.top = reviewCrop.style.top;
      reviewScribble.style.width = reviewCrop.style.width;
      reviewScribble.style.height = reviewCrop.style.height;
      cropOutput.textContent = JSON.stringify(region.metadata, null, 2);
      setOpacityDisplays();
    }

    async function exportOutlinedCrop() {
      exportCrop.disabled = true;
      exportCrop.textContent = "Exporting...";

      try {
        const region = await buildCurrentRegionExport(`preview-${Date.now()}`);
        showRegionExport(region);
      } catch (error) {
        cropOutput.textContent = error.message;
        reviewPanel.hidden = false;
      } finally {
        exportCrop.textContent = "Export PNG";
        updateAnnotationUi();
      }
    }

    async function saveCurrentRegion() {
      const regionId = `region-${String(nextRegionNumber).padStart(3, "0")}`;

      saveRegion.disabled = true;
      saveRegion.textContent = "Saving...";

      try {
        const region = await buildCurrentRegionExport(regionId);
        savedRegions.push(region);
        nextRegionNumber += 1;
        resetPackDownload();
        clearAnnotation();
        selectSavedRegion(region);
      } catch (error) {
        cropOutput.textContent = error.message;
        reviewPanel.hidden = false;
      } finally {
        saveRegion.textContent = "Save Region";
        updateAnnotationUi();
      }
    }

    async function exportRegionPack() {
      if (savedRegions.length === 0 || !window.JSZip) {
        return;
      }

      const scene = panoramas[currentPanorama];
      const zip = new JSZip();
      const sourceExtension = getFileExtension(scene.src);
      const sourceFile = `source/${currentPanorama}.${sourceExtension}`;

      exportPack.disabled = true;
      exportPack.textContent = "Zipping...";

      try {
        zip.file(sourceFile, await fetchSourceBlob(scene));

        const manifestRegions = savedRegions.map((region) => {
          const folder = `regions/${region.metadata.id}`;

          zip.file(`${folder}/crop-original.png`, region.blobs.original);
          zip.file(`${folder}/crop-cutout.png`, region.blobs.cutout);
          zip.file(`${folder}/mask-edit-area.png`, region.blobs.mask);
          zip.file(`${folder}/scribbles.png`, region.blobs.scribbles);
          zip.file(`${folder}/prompt.txt`, region.metadata.prompt);

          return {
            ...region.metadata,
            files: {
              originalCrop: `${folder}/crop-original.png`,
              transparentCrop: `${folder}/crop-cutout.png`,
              editMask: `${folder}/mask-edit-area.png`,
              scribbles: `${folder}/scribbles.png`,
              prompt: `${folder}/prompt.txt`
            }
          };
        });

        zip.file("manifest.json", JSON.stringify({
          version: 1,
          createdAt: new Date().toISOString(),
          panorama: {
            key: currentPanorama,
            label: scene.label,
            source: scene.src,
            sourceFile,
            haov: scene.haov,
            vaov: scene.vaov,
            vOffset: scene.vOffset
          },
          generalPrompt: generalPrompt.value.trim(),
          regions: manifestRegions
        }, null, 2));
        zip.file("one-call-model-input.json", await getModelInputText());

        if (packObjectUrl) {
          URL.revokeObjectURL(packObjectUrl);
        }

        packObjectUrl = URL.createObjectURL(await zip.generateAsync({ type: "blob" }));
        downloadPack.href = packObjectUrl;
        downloadPack.download = `panoreno-test-pack-${Date.now()}.zip`;
        downloadPack.removeAttribute("aria-disabled");
        downloadPack.click();
      } catch (error) {
        cropOutput.textContent = error.message;
        reviewPanel.hidden = false;
      } finally {
        exportPack.textContent = "Export Pack";
        updateAnnotationUi();
      }
    }

    function loadPanorama(key) {
      const scene = panoramas[key];

      if (!scene) {
        setGenerationStatus(`Unknown panorama version: ${key}`, true);
        return;
      }

      if (viewer) {
        saveAnnotationState();
      }

      currentPanorama = key;
      currentRoom = scene.room || currentRoom;
      currentVariant = scene.variant === "generated" ? currentVariant : (scene.variant || currentVariant);

      mountViewer(scene);

      restoreAnnotationState(key);
      activeTool = "none";
      syncViewerInteraction();
      renderVersionControls();
      syncFovControls();
      renderOutline();
      updateAnnotationUi();
    }

    document.querySelectorAll("[data-room]").forEach((button) => {
      button.addEventListener("click", () => {
        const nextRoom = button.dataset.room;
        const nextPanorama = roomPanoramas[nextRoom][currentVariant] || roomPanoramas[nextRoom].remodeled;

        loadPanorama(nextPanorama);
      });
    });

    document.querySelectorAll("[data-variant]").forEach((button) => {
      button.addEventListener("click", () => {
        const nextVariant = button.dataset.variant;
        const nextPanorama = roomPanoramas[currentRoom]?.[nextVariant];

        if (nextPanorama) {
          loadPanorama(nextPanorama);
        }
      });
    });

    drawCanvas.addEventListener("pointerdown", (event) => {
      if (activeTool === "outline" && !isClosed) {
        event.preventDefault();
        const point = getCanvasPoint(event);

        if (isNearOutlineStart(point)) {
          commitCurrentOutline();
          return;
        }

        points.push(point);
        renderOutline();
        return;
      }

      if (activeTool !== "scribble" || !isClosed) {
        return;
      }

      event.preventDefault();
      const point = getCanvasPoint(event);

      if (!pointIsInsideOutline(point)) {
        return;
      }

      currentStroke = {
        color: activeColor,
        points: [point]
      };
      scribbleStrokes.push(currentStroke);
      drawCanvas.setPointerCapture(event.pointerId);
      renderOutline();
    });

    drawCanvas.addEventListener("pointermove", (event) => {
      if (activeTool !== "scribble" || !currentStroke) {
        return;
      }

      event.preventDefault();
      const point = getCanvasPoint(event);

      if (!pointIsInsideOutline(point)) {
        currentStroke = undefined;
        return;
      }

      currentStroke.points.push(point);
      renderOutline();
    });

    drawCanvas.addEventListener("pointerup", () => {
      currentStroke = undefined;
    });

    drawCanvas.addEventListener("pointercancel", () => {
      currentStroke = undefined;
    });

    drawToggle.addEventListener("click", () => setTool("outline"));
    scribbleToggle.addEventListener("click", () => setTool("scribble"));
    exportCrop.addEventListener("click", exportOutlinedCrop);
    modelInputToggle.addEventListener("click", toggleModelInputPanel);
    fovToggle.addEventListener("click", toggleFovPanel);
    exportPack.addEventListener("click", exportRegionPack);
    regionPrompt.addEventListener("input", updateSelectedRegionPrompt);
    uploadPanorama.addEventListener("change", handlePanoramaUpload);
    apiKeyInput.addEventListener("input", updateGenerateButton);
    generateEdit.addEventListener("click", generateCurrentEdit);
    generationPanelToggle.addEventListener("click", () => {
      setGenerationCollapsed(!generationPanel.classList.contains("is-collapsed"));
    });
    viewerControlsToggle.addEventListener("click", () => {
      setViewerControlsCollapsed(!viewerControls.classList.contains("is-collapsed"));
    });
    panelToggle.addEventListener("click", () => {
      setAnnotationCollapsed(!annotationPanel.classList.contains("is-collapsed"));
    });
    fullOpacity.addEventListener("input", setOpacityDisplays);
    cropOpacity.addEventListener("input", setOpacityDisplays);
    radialFov.addEventListener("input", scheduleFovApply);
    topFov.addEventListener("input", scheduleFovApply);
    bottomFov.addEventListener("input", scheduleFovApply);
    fovReset.addEventListener("click", resetFovControls);
    fovClose.addEventListener("click", toggleFovPanel);
    downloadCrop.addEventListener("click", (event) => {
      if (!downloadCrop.href) {
        event.preventDefault();
      }
    });
    downloadScribble.addEventListener("click", (event) => {
      if (!downloadScribble.href) {
        event.preventDefault();
      }
    });
    downloadPack.addEventListener("click", (event) => {
      if (!downloadPack.href) {
        event.preventDefault();
      }
    });
    document.addEventListener("click", (event) => {
      if (activeTool !== "none" || event.target.closest("aside, header, .pnlm-controls-container")) {
        return;
      }

      const selectedRegion = getRegionAtScreenPoint({
        x: event.clientX,
        y: event.clientY
      });

      if (!selectedRegion) {
        return;
      }

      event.preventDefault();
      event.stopPropagation();
      selectSavedRegion(selectedRegion);
    }, true);
    colorButtons.forEach((button) => {
      button.addEventListener("click", () => {
        activeColor = button.dataset.color;

        colorButtons.forEach((colorButton) => {
          colorButton.setAttribute("aria-pressed", String(colorButton === button));
        });
      });
    });
    clearOutline.addEventListener("click", deleteSelectedRegionOrDraft);
    window.addEventListener("resize", resizeDrawCanvas);
    window.setInterval(updateAnnotationUi, 300);

    function renderOverlayFrame() {
      renderOutline();
      window.requestAnimationFrame(renderOverlayFrame);
    }

    setOpacityDisplays();
    configureGenerationMode();
    setViewerControlsCollapsed(isMobileViewport());
    setGenerationCollapsed(isMobileViewport());
    setAnnotationCollapsed(false);
    resizeDrawCanvas();
    loadPanorama("remodeled");
    window.requestAnimationFrame(renderOverlayFrame);
  </script>
</body>
</html>
